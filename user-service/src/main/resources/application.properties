spring.application.name=USER-SERVICE

spring.datasource.url=jdbc:mysql://localhost:3306/mini_user_service?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.cloud.compatibility-verifier.enabled=false

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true


eureka.client.service-url.defaultZone=http://localhost:8100/eureka


server.port=8081

app.jwt.secret=${JWT_SECRET:mini-project-local-dev-secret-change-this-32}
app.jwt.expiry-hours=${JWT_EXPIRY_HOURS:8}
