spring.application.name=API-GATEWAY

server.port=8200

spring.cloud.gateway.routes[0].id = user-service
spring.cloud.gateway.routes[0].uri = lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0] = Path=/api/users/**

spring.cloud.gateway.routes[3].id = auth-service
spring.cloud.gateway.routes[3].uri = lb://USER-SERVICE
spring.cloud.gateway.routes[3].predicates[0] = Path=/api/auth/**

spring.cloud.gateway.routes[1].id = experience-service
spring.cloud.gateway.routes[1].uri = lb://experience-service
spring.cloud.gateway.routes[1].predicates[0] = Path=/api/experience/**

spring.cloud.gateway.routes[2].id = resume-service
spring.cloud.gateway.routes[2].uri = http://localhost:8050
spring.cloud.gateway.routes[2].predicates[0] = Path=/api/resume/**

eureka.client.service-url.defaultZone=http://localhost:8100/eureka

app.jwt.secret=${JWT_SECRET:mini-project-local-dev-secret-change-this-32}

logging.level.org.springframework.cloud.gateway=WARN
