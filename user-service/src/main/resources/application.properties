spring.application.name=USER-SERVICE

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/user_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.cloud.compatibility-verifier.enabled=false

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true


eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8100/eureka}


server.port=${PORT:8081}

app.jwt.secret=${JWT_SECRET:mini-project-local-dev-secret-change-this-32}
app.jwt.expiration=86400000

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
