#spring.application.name=EXPERIENCE-SERVICE
#spring.data.mongodb.uri=mongodb://localhost:27017/experiencedb

spring.application.name=experience-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/experience_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.cloud.compatibility-verifier.enabled=false

eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8100/eureka}

server.port=8082

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

app.jwt.secret=${JWT_SECRET:mini-project-local-dev-secret-change-this-32}

spring.kafka.producer.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
