spring.application.name=unified-backend
server.port=${PORT:8080}

# Optimization for Free Hosting (RAM < 512MB)
spring.main.lazy-initialization=true
spring.jpa.open-in-view=false

# SQL Database (PostgreSQL for Neon.tech)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/user_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

# NoSQL Database (MongoDB Atlas)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/experiencedb}

# Security
app.jwt.secret=${JWT_SECRET:mini-project-local-dev-secret-change-this-32}

# Mail (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.root=INFO
logging.level.org.springframework.security=WARN
