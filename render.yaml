services:
  - type: web
    name: placement-backend
    env: docker
    plan: free
    region: ohio
    dockerContext: unified-backend
    dockerfilePath: unified-backend/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        value: http://notification-service:8080

  - type: web
    name: notification-service
    env: docker
    plan: free
    region: ohio
    dockerContext: notification-service
    dockerfilePath: notification-service/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: MONGODB_URI
        sync: false
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  - type: web
    name: resume-ai-service
    env: docker
    plan: free
    region: ohio
    dockerContext: resume-service
    dockerfilePath: resume-service/Dockerfile
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: user-service
    env: node
    plan: free
    region: ohio
    rootDirectory: dummy-services
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: SERVICE_NAME
        value: user-service

  - type: web
    name: api-gateway
    env: node
    plan: free
    region: ohio
    rootDirectory: dummy-services
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: SERVICE_NAME
        value: api-gateway

  - type: web
    name: eurekha
    env: node
    plan: free
    region: ohio
    rootDirectory: dummy-services
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: SERVICE_NAME
        value: eurekha

  - type: web
    name: discovery-service
    env: node
    plan: free
    region: ohio
    rootDirectory: dummy-services
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: SERVICE_NAME
        value: discovery-service

  - type: web
    name: experience-service
    env: node
    plan: free
    region: ohio
    rootDirectory: dummy-services
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: SERVICE_NAME
        value: experience-service

  - type: web
    name: mentorship-service
    env: node
    plan: free
    region: ohio
    rootDirectory: dummy-services
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: SERVICE_NAME
        value: mentorship-service
