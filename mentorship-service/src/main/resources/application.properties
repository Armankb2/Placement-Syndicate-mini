spring.application.name=mentorship-service

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/mentorship_db}

spring.cloud.compatibility-verifier.enabled=false

eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8100/eureka}

server.port=8085

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

app.jwt.secret=${JWT_SECRET:mini-project-local-dev-secret-change-this-32}

spring.kafka.bootstrap-servers=localhost:29092
